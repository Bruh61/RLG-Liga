<app-page-header title="Teams" subtitle="Verwalte die Teams der Liga">
  <button mat-flat-button (click)="openCreate()">
    <mat-icon>add</mat-icon>
    Neues Team
  </button>
</app-page-header>

@if (teams.isLoading()) {
  <div class="teams__center"><mat-spinner diameter="40" /></div>
} @else if (teams.error()) {
  <app-empty-state
    icon="cloud_off"
    message="Teams konnten nicht geladen werden. Läuft die Mock-API (npm run api)?"
  />
} @else if (teams.value().length === 0) {
  <app-empty-state icon="groups" message="Noch keine Teams angelegt.">
    <button mat-flat-button (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Erstes Team anlegen
    </button>
  </app-empty-state>
} @else {
  <mat-form-field appearance="outline" class="teams__filter" subscriptSizing="dynamic">
    <mat-label>Suchen</mat-label>
    <input
      matInput
      #filterInput
      [value]="filterValue()"
      (input)="applyFilter(filterInput.value)"
      placeholder="Name oder Tag"
    />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="teams__table-wrap">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="badge">
        <th mat-header-cell *matHeaderCellDef aria-label="Wappen"></th>
        <td mat-cell *matCellDef="let team"><app-team-badge [team]="team" /></td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let team">{{ team.name }}</td>
      </ng-container>

      <ng-container matColumnDef="tag">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Tag</th>
        <td mat-cell *matCellDef="let team">{{ team.tag }}</td>
      </ng-container>

      <ng-container matColumnDef="foundedAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Gegründet</th>
        <td mat-cell *matCellDef="let team">{{ team.foundedAt }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let team" class="teams__actions">
          <button
            mat-icon-button
            (click)="openEdit(team)"
            matTooltip="Bearbeiten"
            aria-label="Team bearbeiten"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            (click)="confirmDelete(team)"
            matTooltip="Löschen"
            aria-label="Team löschen"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons />
  </div>
}
