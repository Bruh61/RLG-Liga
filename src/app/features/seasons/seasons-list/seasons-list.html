<app-page-header title="Saisons" subtitle="Plane Saisons und ihren Verlauf">
  <button mat-flat-button (click)="openCreate()">
    <mat-icon>add</mat-icon>
    Neue Saison
  </button>
</app-page-header>

@if (seasons.isLoading()) {
  <div class="seasons__center"><mat-spinner diameter="40" /></div>
} @else if (seasons.error()) {
  <app-empty-state
    icon="cloud_off"
    message="Saisons konnten nicht geladen werden. Läuft die Mock-API (npm run api)?"
  />
} @else if (seasons.value().length === 0) {
  <app-empty-state icon="calendar_month" message="Noch keine Saisons angelegt.">
    <button mat-flat-button (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Erste Saison anlegen
    </button>
  </app-empty-state>
} @else {
  <div class="seasons__table-wrap">
    <table mat-table [dataSource]="seasons.value()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let season">{{ season.name }}</td>
      </ng-container>

      <ng-container matColumnDef="period">
        <th mat-header-cell *matHeaderCellDef>Zeitraum</th>
        <td mat-cell *matCellDef="let season">{{ season.startDate }} – {{ season.endDate }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let season">
          <span class="seasons__status" [attr.data-status]="season.status">
            {{ statusLabel(season.status) }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="format">
        <th mat-header-cell *matHeaderCellDef>Format</th>
        <td mat-cell *matCellDef="let season">{{ formatLabel(season.format) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let season" class="seasons__actions">
          <button mat-icon-button routerLink="/matches" matTooltip="Matches" aria-label="Matches">
            <mat-icon>sports_esports</mat-icon>
          </button>
          <button
            mat-icon-button
            (click)="openEdit(season)"
            matTooltip="Bearbeiten"
            aria-label="Saison bearbeiten"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            (click)="confirmDelete(season)"
            matTooltip="Löschen"
            aria-label="Saison löschen"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
}
